name: MMSpawnerTimerHD
version: '${version}'
main: org.restond.mmspawnertimerhd.MMSpawnerTimer

author: Restond
description: MythicMobs 刷怪点倒计时插件，支持 PlaceholderAPI 变量

depend:
  - PlaceholderAPI

softdepend:
  - MythicMobs
  - DecentHolograms

commands:
  mmspawntimer:
    description: 重载插件配置
    usage: /mmspawntimer reload
    permission: mmspawntimer.reload
    permission-message: 没有权限执行此命令