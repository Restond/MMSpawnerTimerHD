# 作者: Restond

# 支持变量
# - %mmspawner_cooldown_remaining_<刷新点名称>% - cooldown 剩余秒数
# - %mmspawner_cooldown_time_<刷新点名称>% - cooldown 格式化时间
# - %mmspawner_warmup_remaining_<刷新点名称>% - warmup 剩余秒数
# - %mmspawner_warmup_time_<刷新点名称>% - warmup 格式化时间
# - %mmspawner_status_<刷新点名称>% - 状态文本
# - %mmspawner_ready_<刷新点名称>% - 是否就绪
# - %mmspawner_warmup_<刷新点名称>% - 预热时间/秒
# - %mmspawner_cooldown_<刷新点名称>% - 冷却时间/秒

# 时间显示格式
# HH - 小时, mm - 分钟, ss - 秒
time-format: "mm:ss"

# 消息配置
messages:
  # 刷怪点已就绪时显示
  ready: "已刷新"
  # warmup 倒计时中显示
  warmup: "预热中"
  # cooldown 倒计时中显示
  cooldown: "冷却中"
  # 刷怪点不存在时显示
  not-found: "N/A"
