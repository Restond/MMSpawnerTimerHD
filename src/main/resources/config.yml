# 作者: Restond

# 支持变量：
# - %mmspawner_config_text% - 配置的倒计时文本
# - %mmspawner_remaining_<刷新点名称>% - 剩余秒数
# - %mmspawner_time_<刷新点名称>% - 格式化时间 (mm:ss)
# - %mmspawner_status_<刷新点名称>% - 状态文本
# - %mmspawner_ready_<刷新点名称>% - 是否就绪 (true/false)

# 倒计时显示文本
countdown:
  text: "等待刷怪中..."

# 时间显示格式
# HH - 小时, mm - 分钟, ss - 秒
time-format: "mm:ss"

# 消息配置
messages:
  # 刷怪点已就绪时显示
  ready: "已刷新"
  # 倒计时进行中显示
  counting: "计时中"
  # 刷怪点不存在时显示
  not-found: "N/A"
